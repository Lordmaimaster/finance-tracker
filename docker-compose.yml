services:
  app:
    build:
      context: .
      args:
        # Override to serve the API from a different origin (e.g. a reverse proxy).
        # Leave as /api for the standard single-container setup.
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      PGUSER: ${PGUSER:-app}
      PGPASSWORD: ${PGPASSWORD:-changeme}
      PGDATABASE: ${PGDATABASE:-finance_tracker}
      PORT: ${PORT:-3000}
    volumes:
      # Named volume keeps database data across container restarts and rebuilds.
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
