server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # For any path that doesn't match a real file (JS chunk, image, etc.),
    # fall back to index.html so React Router can handle it client-side.
    # Without this, refreshing /transactions returns a 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
